name: Tourism Package Prediction MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data preparation
        run: |
          python model_building/data_preparation.py

      - name: Train and register model
        run: |
          python model_building/train_and_register_model.py

      - name: Validate deployment files
        run: |
          python model_building/validate_deployment.py

      - name: Push deployment files to Hugging Face Space
        run: |
          python deployment/push_to_hf_space.py

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/train.csv data/test.csv models/best_tourism_model.joblib models/model_metadata.json deployment/
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
          else
            git commit -m "Update generated ML artifacts [skip ci]"
            git pull --rebase origin main
            git push
          fi